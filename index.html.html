<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scratch & Win</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dark: #9a7535;
      --charcoal: #1c1c1e;
      --muted: #6b6b6b;
      --card-bg: #ffffff;
      --shadow: 0 20px 60px rgba(0,0,0,0.12);
      --whatsapp: #25D366;
    }
    body {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      position: relative;
      padding: 20px;
    }
    /* Subtle background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    /* Decorative corner marks */
    body::after {
      content: '✦';
      position: fixed;
      top: 2rem; left: 2rem;
      font-size: 1.2rem;
      color: var(--gold);
      opacity: 0.4;
    }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 1;
    }
    header .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dark);
      font-weight: 500;
      margin-bottom: 0.6rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      color: var(--charcoal);
      font-weight: 700;
      line-height: 1.1;
    }
    header h1 span {
      color: var(--gold);
    }
    header p {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.01em;
    }
    /* Card wrapper */
    .card-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .scratch-card-container {
      width: 340px;
      height: 200px;
      border-radius: 20px;
      position: relative;
      box-shadow: var(--shadow), 0 0 0 1px rgba(201,168,76,0.2);
      overflow: hidden;
      background: var(--card-bg);
      cursor: crosshair;
    }
    /* Prize layer (behind) */
    .prize-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, #faf6ee 100%);
      border-radius: 20px;
    }
    .prize-emoji { font-size: 2.8rem; line-height: 1; }
    .prize-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--charcoal);
      font-weight: 700;
    }
    .prize-sub {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    /* Scratch layer (canvas on top) */
    #scratch-canvas {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      touch-action: none;
    }
    /* Reveal animation */
    .prize-layer.revealed .prize-emoji {
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    /* Hint text */
    .hint {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      opacity: 1;
      transition: opacity 0.4s;
    }
    .hint.hidden { opacity: 0; pointer-events: none; }
    .hint-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--gold);
      flex-shrink: 0;
    }
    /* WhatsApp Claim Button */
    .claim-btn {
      margin-top: 1.5rem;
      padding: 0.9rem 2rem;
      background: var(--whatsapp);
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(15px);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
      min-width: 180px;
    }
    .claim-btn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .claim-btn:hover {
      background: #20BA5A;
      box-shadow: 0 6px 25px rgba(37, 211, 102, 0.4);
      transform: translateY(-2px);
    }
    .claim-btn:active {
      transform: translateY(0);
    }
    .whatsapp-icon {
      width: 24px;
      height: 24px;
      fill: white;
    }
    /* Reset button */
    .reset-btn {
      margin-top: 1rem;
      padding: 0.9rem 1.8rem;
      background: transparent;
      border: 1.5px solid var(--gold);
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--gold-dark);
      cursor: pointer;
      transition: all 0.25s;
      opacity: 0;
      pointer-events: none;
      max-width: 340px;
      text-align: center;
      line-height: 1.4;
    }
    .reset-btn.visible {
      opacity: 1;
      pointer-events: auto;
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reset-btn:hover {
      background: var(--gold);
      color: white;
      box-shadow: 0 6px 20px rgba(201,168,76,0.35);
    }
    /* Corner decorations on card */
    .card-deco {
      position: absolute;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.5);
      font-weight: 500;
      pointer-events: none;
      z-index: 2;
    }
    .card-deco.tl { top: 0.7rem; left: 0.9rem; }
    .card-deco.br { bottom: 0.7rem; right: 0.9rem; }
    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.68rem;
      color: rgba(107,107,107,0.5);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <header>
    <div class="eyebrow">Limited Edition</div>
    <h1>Scratch <span>&</span> Win</h1>
    <p>One card. One chance. What's underneath?</p>
  </header>
  <div class="card-wrapper">
    <div class="scratch-card-container" id="scratch-card">
      <!-- Prize layer -->
      <div class="prize-layer" id="prize-layer">
        <div class="prize-emoji" id="prize-emoji">🎁</div>
        <div class="prize-text" id="prize-text">You Won!</div>
        <div class="prize-sub" id="prize-sub">Special Reward</div>
      </div>
      <!-- Scratch canvas -->
      <canvas id="scratch-canvas"></canvas>
      <!-- Corner labels -->
      <div class="card-deco tl">✦ Reveal</div>
      <div class="card-deco br">  Charme Tips ✦</div>
    </div>
    <div class="hint" id="hint">
      <span class="hint-icon">↔</span>
      Scratch with your finger or mouse
    </div>
    <button class="claim-btn" id="claim-btn">
      <svg class="whatsapp-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      Claim Now
    </button>
    <button class="reset-btn" id="reset-btn">Try Again - Gunjan Gave Another Chance Especially For You</button>
  </div>
  <footer>Scratch &amp; Win · One play per card</footer>
  <script>
    // ============================================
    // TOGGLE BROWSER STORAGE: Set to false to disable saving
    // ============================================
    const ENABLE_BROWSER_STORAGE = true; // Change to false to allow unlimited scratches
    
    const prizes = [
      { emoji: '💅', text: 'Extensions', sub: '20% Off', type: 'win' },
      { emoji: '👯', text: 'Bestie Offer', sub: '30% Off on Any Nails', type: 'win' },
      { emoji: '✨', text: 'First Visit Offer', sub: '20% Off on Extensions', type: 'win' },
      { emoji: '🎁', text: 'Collect 5 Visits', sub: 'Free Nail Art', type: 'win' },
      { emoji: '💖', text: 'Gel Polish + Simple Art', sub: '15% Off', type: 'win' },
      { emoji: '🎂', text: 'Birthday Special', sub: 'Free Nail Art on 2 Nails', type: 'win' },
      { emoji: '💍', text: 'Anniversary Special', sub: 'Free Nail Art on 2 Nails', type: 'win' },
      { emoji: '💫', text: 'Better Luck Next Time', sub: 'Keep Trying!', type: 'lose' },
    ];
    
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const card = document.getElementById('scratch-card');
    const prizeLayer = document.getElementById('prize-layer');
    const resetBtn = document.getElementById('reset-btn');
    const claimBtn = document.getElementById('claim-btn');
    const hint = document.getElementById('hint');
    
    let isDrawing = false;
    let revealed = false;
    let claimButtonShown = false;
    let currentPrize = null;
    
    // WhatsApp configuration
    const whatsappNumber = '917767867749'; // WhatsApp number without + or spaces
    
    // Storage key for localStorage
    const STORAGE_KEY = 'scratchCardState';
    
    // Check if card was already scratched
    function getSavedState() {
      if (!ENABLE_BROWSER_STORAGE) return null; // If storage is disabled, always return null
      
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch (e) {
          return null;
        }
      }
      return null;
    }
    
    // Save card state
    function saveState(prize, isRevealed) {
      if (!ENABLE_BROWSER_STORAGE) return; // If storage is disabled, don't save
      
      const state = {
        prize: prize,
        revealed: isRevealed,
        timestamp: new Date().toISOString()
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    
    // Clear saved state (for "Try Again" button on Better Luck Next Time)
    function clearState() {
      if (!ENABLE_BROWSER_STORAGE) return; // If storage is disabled, nothing to clear
      localStorage.removeItem(STORAGE_KEY);
    }
    
    function pickPrize() {
      return prizes[Math.floor(Math.random() * prizes.length)];
    }
    
    function initCard() {
      // Check if there's a saved state
      const savedState = getSavedState();
      
      if (savedState) {
        // Load the saved prize
        currentPrize = savedState.prize;
        revealed = savedState.revealed;
        
        document.getElementById('prize-emoji').textContent = currentPrize.emoji;
        document.getElementById('prize-text').textContent = currentPrize.text;
        document.getElementById('prize-sub').textContent = currentPrize.sub;
        
        // If already revealed, show the result immediately
        if (savedState.revealed) {
          canvas.style.display = 'none';
          prizeLayer.classList.add('revealed');
          hint.classList.add('hidden');
          
          // Show appropriate buttons
          if (currentPrize.type === 'win') {
            claimBtn.classList.add('visible');
            claimButtonShown = true;
          } else {
            resetBtn.classList.add('visible');
          }
          return;
        }
      } else {
        // Pick a new random prize
        currentPrize = pickPrize();
        // Save the initial state
        saveState(currentPrize, false);
      }
      
      document.getElementById('prize-emoji').textContent = currentPrize.emoji;
      document.getElementById('prize-text').textContent = currentPrize.text;
      document.getElementById('prize-sub').textContent = currentPrize.sub;
      
      const rect = card.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      
      canvas.width = W;
      canvas.height = H;
      
      revealed = false;
      claimButtonShown = false;
      
      // Draw gold scratch surface
      const grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, '#d4a84b');
      grad.addColorStop(0.4, '#e8c96a');
      grad.addColorStop(0.7, '#c9a84c');
      grad.addColorStop(1, '#9a7535');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      
      // Subtle noise texture lines
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      for (let y = 0; y < H; y += 6) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      
      // "SCRATCH HERE" label
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.font = '700 11px "DM Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('✦  SCRATCH HERE  ✦', W / 2, H / 2 + 4);
      
      canvas.style.display = 'block';
      canvas.style.opacity = '1';
      canvas.style.transition = '';
      
      resetBtn.classList.remove('visible');
      claimBtn.classList.remove('visible');
      hint.classList.remove('hidden');
    }
    
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * (canvas.width / rect.width),
        y: (src.clientY - rect.top) * (canvas.height / rect.height)
      };
    }
    
    function checkScratchPercentage() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imageData.data;
      let transparent = 0;
      
      // Sample every 4th pixel for performance
      for (let i = 3; i < pixels.length; i += 16) {
        if (pixels[i] < 128) transparent++;
      }
      
      const totalSampled = pixels.length / 16;
      const percentage = (transparent / totalSampled) * 100;
      
      return percentage;
    }
    
    function scratch(x, y) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, 28, 0, Math.PI * 2);
      ctx.fill();
      
      if (!revealed) {
        const percentage = checkScratchPercentage();
        
        // Show claim button at 10% scratched
        if (!claimButtonShown && percentage >= 10) {
          claimButtonShown = true;
          claimBtn.classList.add('visible');
          hint.classList.add('hidden');
          console.log('Claim button shown at', percentage.toFixed(1) + '%');
        }
        
        // Full reveal at 45%
        if (percentage >= 45) {
          revealCard();
        }
      }
    }
    
    function revealCard() {
      revealed = true;
      
      // Save the revealed state
      saveState(currentPrize, true);
      
      canvas.style.transition = 'opacity 0.6s ease';
      canvas.style.opacity = '0';
      setTimeout(() => { 
        canvas.style.display = 'none'; 
      }, 600);
      
      prizeLayer.classList.add('revealed');
      hint.classList.add('hidden');
      
      // Only show reset button if it's "Better Luck Next Time"
      if (currentPrize.type === 'lose') {
        resetBtn.classList.add('visible');
      }
    }
    
    // WhatsApp claim button handler
    claimBtn.addEventListener('click', () => {
      const message = encodeURIComponent(`${currentPrize.text} - ${currentPrize.sub}`);
      const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${message}`;
      window.open(whatsappUrl, '_blank');
    });
    
    // Mouse events
    canvas.addEventListener('mousedown', (e) => { 
      isDrawing = true; 
      const pos = getPos(e);
      scratch(pos.x, pos.y); 
    });
    
    canvas.addEventListener('mousemove', (e) => { 
      if (isDrawing) {
        const pos = getPos(e);
        scratch(pos.x, pos.y);
      }
    });
    
    canvas.addEventListener('mouseup', () => { 
      isDrawing = false; 
    });
    
    canvas.addEventListener('mouseleave', () => { 
      isDrawing = false; 
    });
    
    // Touch events
    canvas.addEventListener('touchstart', (e) => { 
      e.preventDefault(); 
      isDrawing = true; 
      const pos = getPos(e);
      scratch(pos.x, pos.y); 
    }, { passive: false });
    
    canvas.addEventListener('touchmove', (e) => { 
      e.preventDefault(); 
      if (isDrawing) {
        const pos = getPos(e);
        scratch(pos.x, pos.y);
      }
    }, { passive: false });
    
    canvas.addEventListener('touchend', () => { 
      isDrawing = false; 
    });
    
    // Reset button (only for "Better Luck Next Time")
    resetBtn.addEventListener('click', () => {
      clearState(); // Clear the saved state so they get a new card
      location.reload(); // Reload to get a fresh card
    });
    
    // Initialize
    initCard();
  </script>
</body>
</html>
