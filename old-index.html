<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scratch & Win</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dark: #9a7535;
      --charcoal: #1c1c1e;
      --muted: #6b6b6b;
      --card-bg: #ffffff;
      --shadow: 0 20px 60px rgba(0,0,0,0.12);
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Subtle background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Decorative corner marks */
    body::after {
      content: '✦';
      position: fixed;
      top: 2rem; left: 2rem;
      font-size: 1.2rem;
      color: var(--gold);
      opacity: 0.4;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 1;
    }

    header .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dark);
      font-weight: 500;
      margin-bottom: 0.6rem;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      color: var(--charcoal);
      font-weight: 700;
      line-height: 1.1;
    }

    header h1 span {
      color: var(--gold);
    }

    header p {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* Card wrapper */
    .card-wrapper {
      position: relative;
      z-index: 1;
    }

    .scratch-card-container {
      width: 340px;
      height: 200px;
      border-radius: 20px;
      position: relative;
      box-shadow: var(--shadow), 0 0 0 1px rgba(201,168,76,0.2);
      overflow: hidden;
      background: var(--card-bg);
      cursor: crosshair;
    }

    /* Prize layer (behind) */
    .prize-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, #faf6ee 100%);
      border-radius: 20px;
    }

    .prize-emoji { font-size: 2.8rem; line-height: 1; }

    .prize-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--charcoal);
      font-weight: 700;
    }

    .prize-sub {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Scratch layer (canvas on top) */
    #scratch-canvas {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      touch-action: none;
    }

    /* Reveal animation */
    .prize-layer.revealed .prize-emoji {
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Hint text */
    .hint {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      opacity: 1;
      transition: opacity 0.4s;
    }

    .hint.hidden { opacity: 0; }

    .hint-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--gold);
      flex-shrink: 0;
    }

    /* Reset button */
    .reset-btn {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      background: transparent;
      border: 1.5px solid var(--gold);
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-dark);
      cursor: pointer;
      transition: all 0.25s;
      opacity: 0;
      pointer-events: none;
      display: block;
    }

    .reset-btn.visible {
      opacity: 1;
      pointer-events: auto;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reset-btn:hover {
      background: var(--gold);
      color: white;
      box-shadow: 0 6px 20px rgba(201,168,76,0.35);
    }

    /* Corner decorations on card */
    .card-deco {
      position: absolute;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.5);
      font-weight: 500;
      pointer-events: none;
      z-index: 2;
    }
    .card-deco.tl { top: 0.7rem; left: 0.9rem; }
    .card-deco.br { bottom: 0.7rem; right: 0.9rem; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.68rem;
      color: rgba(107,107,107,0.5);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <header>
    <div class="eyebrow">Limited Edition</div>
    <h1>Scratch <span>&</span> Win</h1>
    <p>One card. One chance. What's underneath?</p>
  </header>

  <div class="card-wrapper">
    <div class="scratch-card-container" id="scratch-card">
      <!-- Prize layer -->
      <div class="prize-layer" id="prize-layer">
        <div class="prize-emoji" id="prize-emoji">🎁</div>
        <div class="prize-text" id="prize-text">You Won!</div>
        <div class="prize-sub" id="prize-sub">Special Reward</div>
      </div>

      <!-- Scratch canvas -->
      <canvas id="scratch-canvas"></canvas>

      <!-- Corner labels -->
      <div class="card-deco tl">✦ Reveal</div>
      <div class="card-deco br">2026 ✦</div>
    </div>

    <div class="hint" id="hint">
      <span class="hint-icon">↔</span>
      Scratch with your finger or mouse
    </div>

    <button class="reset-btn" id="reset-btn">Try Again</button>
  </div>

  <footer>Scratch &amp; Win · One play per card</footer>

  <script>
    const prizes = [
      { emoji: '🏆', text: 'Grand Prize', sub: '$500 Voucher', color: '#c9a84c' },
      { emoji: '💎', text: 'Diamond Win', sub: 'Exclusive Gift', color: '#5b9bd5' },
      { emoji: '🎉', text: 'You Won!', sub: 'Free Coffee', color: '#e07b54' },
      { emoji: '🌟', text: 'Lucky Star', sub: '20% Discount', color: '#7ac47a' },
      { emoji: '🎀', text: 'Special Offer', sub: 'Mystery Box', color: '#b57fc4' },
      { emoji: '💫', text: 'Try Again', sub: 'Better Luck Soon', color: '#999' },
    ];

    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    const card = document.getElementById('scratch-card');
    const prizeLayer = document.getElementById('prize-layer');
    const resetBtn = document.getElementById('reset-btn');
    const hint = document.getElementById('hint');

    let isDrawing = false;
    let scratchedPixels = 0;
    let totalPixels = 0;
    let revealed = false;

    function pickPrize() {
      return prizes[Math.floor(Math.random() * prizes.length)];
    }

    function initCard() {
      const prize = pickPrize();
      document.getElementById('prize-emoji').textContent = prize.emoji;
      document.getElementById('prize-text').textContent = prize.text;
      document.getElementById('prize-sub').textContent = prize.sub;

      const W = card.offsetWidth;
      const H = card.offsetHeight;
      canvas.width = W;
      canvas.height = H;
      totalPixels = W * H;
      scratchedPixels = 0;
      revealed = false;

      // Draw gold scratch surface
      const grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, '#d4a84b');
      grad.addColorStop(0.4, '#e8c96a');
      grad.addColorStop(0.7, '#c9a84c');
      grad.addColorStop(1, '#9a7535');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Subtle noise texture lines
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      for (let y = 0; y < H; y += 6) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      // "SCRATCH HERE" label
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.font = '700 11px "DM Sans", sans-serif';
      ctx.letterSpacing = '0.2em';
      ctx.textAlign = 'center';
      ctx.fillText('✦  SCRATCH HERE  ✦', W / 2, H / 2 + 4);

      canvas.style.display = 'block';
      resetBtn.classList.remove('visible');
      hint.classList.remove('hidden');
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return {
        x: src.clientX - rect.left,
        y: src.clientY - rect.top
      };
    }

    function scratch(x, y) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, 28, 0, Math.PI * 2);
      ctx.fill();

      // Check reveal percentage
      if (!revealed) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let cleared = 0;
        for (let i = 3; i < imageData.data.length; i += 4) {
          if (imageData.data[i] === 0) cleared++;
        }
        if (cleared / totalPixels > 0.45) {
          revealCard();
        }
      }
    }

    function revealCard() {
      revealed = true;
      canvas.style.transition = 'opacity 0.6s ease';
      canvas.style.opacity = '0';
      setTimeout(() => { canvas.style.display = 'none'; }, 600);
      hint.classList.add('hidden');
      resetBtn.classList.add('visible');
    }

    canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(...Object.values(getPos(e))); });
    canvas.addEventListener('mousemove', (e) => { if (isDrawing) scratch(...Object.values(getPos(e))); });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; scratch(...Object.values(getPos(e))); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (isDrawing) scratch(...Object.values(getPos(e))); }, { passive: false });
    canvas.addEventListener('touchend', () => isDrawing = false);

    resetBtn.addEventListener('click', initCard);

    initCard();
  </script>
</body>
</html>
